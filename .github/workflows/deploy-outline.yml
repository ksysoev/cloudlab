name: Deploy Outline VPN

on:
  push:
    branches: [main]
    paths:
      - "stacks/outline-vpn/**"
      - ".github/workflows/deploy-outline.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # Ensure a self-signed TLS certificate exists in the named volume before the
  # stack is deployed. Shadowbox requires SB_CERTIFICATE_FILE and
  # SB_PRIVATE_KEY_FILE to point at readable files — it does not generate them.
  # This job is idempotent: it skips generation when the cert is already present.
  bootstrap-tls:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Prepare SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SWARM_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          SSH_PORT="${{ secrets.SWARM_SSH_PORT }}"
          if [ -z "$SSH_PORT" ]; then SSH_PORT="1923"; fi
          ssh-keyscan -p "$SSH_PORT" -H make-it-public.dev >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Generate TLS certificate if absent
        run: |
          SSH_PORT="${{ secrets.SWARM_SSH_PORT }}"
          if [ -z "$SSH_PORT" ]; then SSH_PORT="1923"; fi
          SSH_USER="${{ secrets.SWARM_USER }}"
          if [ -z "$SSH_USER" ]; then SSH_USER="deployer"; fi

          # Derive the Swarm stack name using the same sanitisation logic as
          # deploy-service.yml (lowercase, strip non-alnum, strip hyphens).
          # This must stay in sync with service_name: in the deploy job below.
          SERVICE_RAW="outline-vpn"
          STACK_NAME=$(echo "$SERVICE_RAW" | tr '[:upper:]' '[:lower:]' | tr -cd '[:alnum:]-' | tr -d '-')

          ssh -i ~/.ssh/deploy_key \
              -p "$SSH_PORT" \
              -o StrictHostKeyChecking=accept-new \
              "${SSH_USER}@make-it-public.dev" \
              STACK_NAME="$STACK_NAME" \
              bash << 'EOF'
            set -euo pipefail

            # Volume name = <stack>_<compose-volume-key>
            VOLUME="${STACK_NAME}_outline-state"
            CERT_PATH="shadowbox-selfsigned.crt"
            KEY_PATH="shadowbox-selfsigned.key"

            # Create the volume if this is the very first deploy.
            docker volume create "$VOLUME" > /dev/null 2>&1 || true

            # Check whether the cert + key already exist inside the volume.
            EXISTS=$(docker run --rm \
              -v "${VOLUME}:/state" \
              alpine sh -c "[ -s /state/${CERT_PATH} ] && [ -s /state/${KEY_PATH} ] && echo yes || echo no")
            if [ "$EXISTS" = "yes" ]; then
              echo "TLS certificate already present, skipping generation."
              exit 0
            fi

            echo "Generating self-signed TLS certificate (valid 100 years)..."
            docker run --rm \
              -v "${VOLUME}:/state" \
              alpine sh -c "
                apk add --no-cache openssl > /dev/null 2>&1
                openssl req -x509 -nodes -days 36500 -newkey rsa:4096 \
                  -subj '/CN=make-it-public.dev' \
                  -keyout /state/${KEY_PATH} \
                  -out    /state/${CERT_PATH}
              "
            echo "Certificate generated at ${CERT_PATH}."
          EOF

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key

  deploy:
    needs: bootstrap-tls
    uses: ./.github/workflows/deploy-service.yml
    with:
      service_name: outline-vpn
      docker_compose_file: stacks/outline-vpn/docker-compose.yml
      # make-it-public.dev is a non-proxied A record pointing directly to the
      # droplet, so SSH and the Outline Manager API both reach the server.
      ssh_host: make-it-public.dev
      health_check_timeout: 90
      environment_name: production
    secrets:
      ssh_key: ${{ secrets.SWARM_SSH_KEY }}
      ssh_user: ${{ secrets.SWARM_USER }}
      ssh_port: ${{ secrets.SWARM_SSH_PORT }}
      deployment_secrets: ${{ secrets.OUTLINE_DEPLOYMENT_SECRETS }}
