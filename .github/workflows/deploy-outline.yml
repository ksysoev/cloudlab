name: Deploy Outline VPN

on:
  push:
    branches: [main]
    paths:
      - "stacks/outline-vpn/**"
  workflow_dispatch:

jobs:
  deploy:
    uses: ./.github/workflows/deploy-service.yml
    with:
      service_name: outline-vpn
      docker_compose_file: stacks/outline-vpn/docker-compose.yml
      # make-it-public.dev is a non-proxied A record pointing directly to the
      # droplet, so SSH and the Outline Manager API both reach the server.
      ssh_host: make-it-public.dev
      health_check_timeout: 90
      environment_name: production
    secrets:
      ssh_key: ${{ secrets.SWARM_SSH_KEY }}
      ssh_user: ${{ secrets.SWARM_USER }}
      ssh_port: ${{ secrets.SWARM_SSH_PORT }}
