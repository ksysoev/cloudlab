services:
  shadowbox:
    image: quay.io/outline/shadowbox:stable
    # Ports are published in host mode so traffic reaches the container
    # directly without going through the Swarm ingress load-balancer.
    # network_mode: host is intentionally NOT used — docker stack deploy
    # silently ignores it, which would leave Shadowbox inaccessible.
    #
    # Port 8443 (management API) is intentionally NOT published. The API is
    # accessed exclusively via `docker exec` from the server over SSH.
    # See stacks/outline-vpn/README.md for key management instructions.
    ports:
      - target: 8388
        published: 8388
        protocol: tcp
        mode: host
      - target: 8388
        published: 8388
        protocol: udp
        mode: host
    volumes:
      - outline-state:/root/shadowbox/persisted-state
    environment:
      SB_API_PORT: "8443"
      SB_DEFAULT_SERVER_NAME: "cloudlab-outline"
      # Shadowbox requires explicit cert paths — it does not generate certs
      # itself. The bootstrap-tls job in deploy-outline.yml pre-generates a
      # self-signed cert into the named volume before the stack is deployed.
      SB_CERTIFICATE_FILE: /root/shadowbox/persisted-state/shadowbox-selfsigned.crt
      SB_PRIVATE_KEY_FILE: /root/shadowbox/persisted-state/shadowbox-selfsigned.key
      # Secret URL prefix for the management API. Without this anyone who can
      # reach port 8443 could call the API. Set via OUTLINE_DEPLOYMENT_SECRETS
      # GitHub Actions secret (production environment) and substituted by
      # docker stack deploy at deploy time.
      SB_API_PREFIX: "${SB_API_PREFIX}"
    deploy:
      replicas: 1
      # Pin to the manager node so the local named volume (outline-state) is
      # always accessible. If the service were rescheduled onto a different
      # node the volume would not follow it, causing TLS cert / key loss.
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 3

# Image updates are handled by the deploy-outline.yml GitHub Actions workflow,
# which runs `docker stack deploy --resolve-image always` and always re-pulls
# from the registry. A separate Watchtower service is therefore not needed.

volumes:
  outline-state:
    driver: local
