services:
  shadowbox:
    image: quay.io/outline/shadowbox:stable
    # Ports are published in host mode so traffic reaches the container
    # directly without going through the Swarm ingress load-balancer.
    # network_mode: host is intentionally NOT used — docker stack deploy
    # silently ignores it, which would leave Shadowbox inaccessible.
    ports:
      - target: 8443
        published: 8443
        protocol: tcp
        mode: host
      - target: 8388
        published: 8388
        protocol: tcp
        mode: host
      - target: 8388
        published: 8388
        protocol: udp
        mode: host
    volumes:
      - outline-state:/root/shadowbox/persisted-state
    environment:
      SB_API_PORT: "8443"
      SB_DEFAULT_SERVER_NAME: "cloudlab-outline"
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    deploy:
      replicas: 1
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 3

  watchtower:
    image: containrrr/watchtower:latest
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    # Check for image updates every 24 hours; remove old images after update;
    # only watch containers that have the opt-in label.
    command: --interval 86400 --cleanup --label-enable
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: any

volumes:
  outline-state:
    driver: local
