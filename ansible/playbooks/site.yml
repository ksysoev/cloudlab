---
# CloudLab Server Configuration Playbook
# This playbook configures the DigitalOcean droplet with all required services

- name: Bootstrap fresh droplet
  # Connects as root on port 22 — only available on a brand-new droplet.
  # Creates the deployer user, SSH key, sudo access, and sets the custom SSH port.
  # Skipped entirely if the host is unreachable on port 22 (existing droplet where
  # root login and port 22 are already disabled) or if the deployer user already exists.
  hosts: swarm
  become: true
  gather_facts: false
  ignore_unreachable: true
  vars:
    ansible_user: root
    ansible_port: 22

  pre_tasks:
    - name: Check if deployer user exists
      ansible.builtin.raw: id deployer
      register: deployer_check
      failed_when: false
      changed_when: false

  roles:
    - role: bootstrap
      when: >
        deployer_check.rc is defined
        and deployer_check.rc != 0
      tags: [bootstrap]

- name: Configure CloudLab Swarm Infrastructure
  hosts: swarm
  become: true
  gather_facts: true

  roles:
    - role: common
      tags: [common, base]

    - role: security
      tags: [security, firewall, ssh]

    - role: docker
      tags: [docker, swarm]

    - role: monitoring
      tags: [monitoring, alloy]

  post_tasks:
    - name: Display configuration summary
      ansible.builtin.debug:
        msg:
          - "CloudLab configuration complete!"
          - "Instance: {{ swarm_instance_name }}"
          - "Public IP: {{ ansible_host }}"
          - "SSH Port: {{ ssh_port }}"
          - "Docker Swarm: Active"
          - >-
            Grafana Alloy: {{ 'Configured'
            if grafana_cloud_logs_url != '' else 'Local mode' }}
