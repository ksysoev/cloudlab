---
# CloudLab Server Configuration Playbook
# This playbook configures the DigitalOcean droplet with all required services

- name: Bootstrap fresh droplet
  # Connects as root on port 22 — only on a brand-new droplet.
  # Creates the deployer user, SSH key, sudo, and sets the SSH port.
  # Skipped if host is unreachable on port 22 (existing droplet where
  # root login and port 22 are disabled) or deployer user already exists.
  hosts: swarm
  become: true
  gather_facts: false
  ignore_unreachable: true
  vars:
    ansible_user: root
    ansible_port: 22

  pre_tasks:
    - name: Check if deployer user exists
      ansible.builtin.raw: id deployer
      register: deployer_check
      failed_when: false
      changed_when: false

  roles:
    - role: bootstrap
      when: >
        deployer_check.rc is defined
        and deployer_check.rc != 0
      tags: [bootstrap]

  post_tasks:
    - name: Warn if bootstrap was skipped due to unreachable host
      ansible.builtin.debug:
        msg: >-
          Bootstrap skipped: host was unreachable on port 22.
          If this is a fresh droplet the next play will fail on
          port 1923 — re-run once the droplet is fully booted.
      when: >
        deployer_check is not defined or
        deployer_check.rc is not defined

- name: Configure CloudLab Swarm Infrastructure
  hosts: swarm
  become: true
  gather_facts: true

  roles:
    - role: common
      tags: [common, base]

    - role: security
      tags: [security, firewall, ssh]

    - role: docker
      tags: [docker, swarm]

    - role: monitoring
      tags: [monitoring, alloy]

  post_tasks:
    - name: Display configuration summary
      ansible.builtin.debug:
        msg:
          - "CloudLab configuration complete!"
          - "Instance: {{ swarm_instance_name }}"
          - "Public IP: {{ ansible_host }}"
          - "SSH Port: {{ ssh_port }}"
          - "Docker Swarm: Active"
          - >-
            Grafana Alloy: {{ 'Configured'
            if grafana_cloud_logs_url != '' else 'Local mode' }}
